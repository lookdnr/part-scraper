# Tracked products.
#
# A "product" is the thing you actually want (one SKU, ideally the same SKU
# across shops so prices are comparable). Each listing is one shop's page for
# it. Deal detection runs on the best in-stock price across a product's
# listings.
#
# site must match a parser key registered in pricetracker/parsers/
# (currently: scan, novatech, awdit).
#
# All settings are optional; defaults live in pricetracker/deals.py.

settings:
  lookback_days: 30        # window for "recent history"
  min_history_days: 14     # days of data before the main signals activate
  min_drop_pct: 2.0        # rolling-low must undercut the old low by this much
  median_drop_pct: 10.0    # sharp-discount signal vs trailing median
  bootstrap_min_days: 7    # early all-time-low signal needs at least this much
  bootstrap_drop_pct: 5.0
  cooldown_days: 3         # quiet period after an alert...
  cooldown_break_pct: 3.0  # ...unless price drops this much further

